<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SUPER IPTV - Create User & Payment</title>

<link rel="stylesheet" href="style.css">

<!-- QR Code Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
📺 SUPER IPTV
</div>

<a href="dashboard.html">🏠 Dashboard</a>

<a href="users.html">👥 Users</a>

<a href="payments.html" class="active">💳 Payments</a>

<a href="reports.html">📊 Reports</a>

<a href="settings.html">⚙ Settings</a>

<a href="index.html">🚪 Logout</a>

</div>


<!-- MAIN -->

<div class="main">

<div class="top">

<h1>End User Activation</h1>

</div>


<!-- STATS -->

<div class="cards">

<div class="card">

<h3>Total Payments</h3>

<h2 id="totalPayments">0</h2>

</div>


<div class="card">

<h3>Paid</h3>

<h2 id="paidPayments">0</h2>

</div>


<div class="card">

<h3>Pending</h3>

<h2 id="pendingPayments">0</h2>

</div>


<div class="card">

<h3>Total Revenue</h3>

<h2 id="totalRevenue">₹0</h2>

</div>

</div>


<!-- CREATE USER + PAYMENT -->

<div class="form">

<h2>👤 Create User + Payment</h2>


<input
id="phone"
type="tel"
placeholder="Phone Number"
>


<input
id="username"
placeholder="Username"
>


<input
id="password"
placeholder="Password"
>


<input
id="portal"
placeholder="Portal URL"
value="http://geoiptv.one:8880"
>


<select id="plan">

<option value="1 Month">1 Month - ₹200</option>

<option value="3 Months">3 Months - ₹600</option>

<option value="6 Months">6 Months - ₹1150</option>

<option value="12 Months">12 Months - ₹2000</option>

</select>


<input
id="amount"
type="number"
placeholder="Amount"
readonly
>


<input
id="upi"
placeholder="UPI ID"
value="6289033804@ptsbi"
>


<input
id="support"
placeholder="Support Number"
value="6289033804"
>


<select id="paymentStatus">

<option value="Paid">Paid</option>

<option value="Pending">Pending</option>

</select>


<h3 style="margin-top:15px;">
💳 UPI QR Code
</h3>


<div
id="qrcode"
style="background:white;
padding:10px;
width:180px;
min-height:180px;
margin:15px auto;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;">
</div>


<p
id="qrText"
style="text-align:center;
margin-bottom:15px;">
Scan to Pay
</p>


<button
class="addBtn"
onclick="createUserAndPayment()">

🚀 Create User + Payment

</button>

</div>


<!-- PAYMENT HISTORY -->

<h2>Payment History</h2>


<input
class="search"
id="searchPayment"
placeholder="Search Username / Phone / Method..."
onkeyup="loadPayments()"
>


<br><br>


<table>

<thead>

<tr>

<th>ID</th>

<th>Username</th>

<th>Phone</th>

<th>Amount</th>

<th>Plan</th>

<th>Status</th>

<th>Date</th>

<th>Action</th>

</tr>

</thead>


<tbody id="paymentTable">

</tbody>

</table>


</div>


<script src="payments.js"></script>

</body>

</html>
